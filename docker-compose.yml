version: '3.8'

services:
  # API (NestJS)
  api:
    container_name: api
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    ports:
      - '3000:3000'
    depends_on:
      - postgres
    environment:
      - DATABASE_URL=postgresql://betola:betola123@postgres:5432/betola_db
    networks:
      - app-network

  # Frontend (Next.js)
  web:
    container_name: web
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    ports:
      - '3002:3000'
    depends_on:
      - api
    networks:
      - app-network

  # PostgreSQL
  postgres:
    container_name: postgres
    image: postgres:14-alpine
    ports:
      - '5434:5432'
    environment:
      - POSTGRES_USER=betola
      - POSTGRES_PASSWORD=betola123
      - POSTGRES_DB=betola_db
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - app-network

volumes:
  postgres-data:

networks:
  app-network:
    driver: bridge 